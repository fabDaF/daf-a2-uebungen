<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Image Downloader</title><style>/* ===== FB-DARK-MODE (Minimal-Layer Hilfsseite) ===== */
@media (prefers-color-scheme: dark) {
  :root:not([data-theme="light"]) body { background: #171a28 !important; color: #d6d8e8; }
  :root:not([data-theme="light"]) input, :root:not([data-theme="light"]) textarea, :root:not([data-theme="light"]) select, :root:not([data-theme="light"]) button { color: inherit; background: #23263a; border-color: #3a3e58; }
  :root:not([data-theme="light"]) a { color: #93a0f2; }
}
html[data-theme="dark"] body { background: #171a28 !important; color: #d6d8e8; }
html[data-theme="dark"] input, html[data-theme="dark"] textarea, html[data-theme="dark"] select, html[data-theme="dark"] button { color: inherit; background: #23263a; border-color: #3a3e58; }
html[data-theme="dark"] a { color: #93a0f2; }
</style>
</head>
<body>
<h2>Lade Bilder herunter und bettet sie ein...</h2>
<pre id="log">Starte...</pre>
<script>
const URLS = {
  "test_3785708": "https://images.pexels.com/photos/3785708/pexels-photo-3785708.jpeg?auto=compress&cs=tinysrgb&w=400&h=300&fit=crop"
};

(async function() {
  const log = document.getElementById('log');
  for (const [id, url] of Object.entries(URLS)) {
    try {
      const r = await fetch(url, {mode: 'cors'});
      const status = r.status;
      const corsHeader = r.headers.get('Access-Control-Allow-Origin');
      log.textContent += '\n' + id + ': status=' + status + ' CORS=' + corsHeader;
    } catch(e) {
      log.textContent += '\nERROR: ' + e.message;
    }
  }
  log.textContent += '\nFertig.';
})();
</script>
</body>
</html>
